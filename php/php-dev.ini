; ── FINDIR php-dev.ini (local development) ───────────────────────

[PHP]
display_errors     = On
display_startup_errors = On
error_reporting    = E_ALL
log_errors         = On

; Xdebug (опционально, раскомментировать если нужен)
; zend_extension=xdebug
; xdebug.mode=debug
; xdebug.start_with_request=yes
; xdebug.client_host=host.docker.internal
; xdebug.client_port=9003

; OPcache выключаем в dev для live reload
opcache.enable     = 0
opcache.validate_timestamps = 1
