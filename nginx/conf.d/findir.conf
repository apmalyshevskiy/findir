# ══════════════════════════════════════════════════════════════════
#  FINDIR — Nginx конфиг
#  HTTP → HTTPS редирект + основной HTTPS сервер
# ══════════════════════════════════════════════════════════════════

# ── Upstream PHP-FPM ──────────────────────────────────────────────
upstream php_fpm {
    server php:9000;
    keepalive 32;
}

# ── Карта тенантов (по поддомену) ─────────────────────────────────
# Nginx просто проксирует всё в PHP, Laravel сам определяет тенант
# через stancl/tenancy по HOST заголовку

# ── HTTP → HTTPS редирект ─────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS основной сервер ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # ── SSL ───────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Лимиты ────────────────────────────────────────────────────
    client_max_body_size 64M;

    # ── API → PHP-FPM ─────────────────────────────────────────────
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass   php_fpm;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 8 16k;
        }
    }

    # ── Sanctum csrf-cookie → PHP ─────────────────────────────────
    location /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass   php_fpm;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ── Horizon dashboard ─────────────────────────────────────────
    location /horizon/ {
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass   php_fpm;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ── Статичные файлы Laravel (storage) ─────────────────────────
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA — всё остальное ─────────────────────────────────
    location / {
        root /var/www/web;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback

        # Кэш для статики SPA
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Запрет доступа к скрытым файлам ──────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Логи ──────────────────────────────────────────────────────
    access_log /var/log/nginx/findir_access.log;
    error_log  /var/log/nginx/findir_error.log;
}
